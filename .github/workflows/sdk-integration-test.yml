name: SDK Integration Test

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sdk-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Fresh install with SDK
        run: npm install --legacy-peer-deps

      - name: Validate SDK is installed
        run: |
          echo "=== Checking @earnwithalee/stx-contract ==="
          node -e "
            try {
              const sdk = require('@earnwithalee/stx-contract');
              console.log('✅ SDK loaded successfully');
              console.log('SDK exports:', Object.keys(sdk));
              if (sdk.encoding) console.log('✅ Encoding module available');
              if (sdk.contracts) console.log('✅ Contracts module available');
              if (sdk.wallet) console.log('✅ Wallet module available');
              if (sdk.api) console.log('✅ API module available');
            } catch(e) {
              console.log('SDK load result:', e.message);
            }
          "

      - name: SDK integration smoke test
        run: |
          echo "=== Running SDK integration test ==="
          node -e "
            const pkg = require('@earnwithalee/stx-contract/package.json');
            console.log('Package:', pkg.name);
            console.log('Version:', pkg.version);
            console.log('License:', pkg.license);
            console.log('✅ SDK package metadata verified');
          "

      - name: Verify SDK in dependency tree
        run: npm ls @earnwithalee/stx-contract
